<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <link rel="icon" type="image/x-icon" href="/public/Favicon/favicon.ico" />
    <title>Display</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&family=Major+Mono+Display&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preload"
      href="Montserrat-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <style>
      /* global reset & base */
    </style>
  </head>
  <body class="h-dvh w-full overflow-x-hidden">
    <div id="displayContent" class="h-full w-full flex flex-col">
      <div
        class="flex flex-col lg:flex-row items-stretch justify-between gap-5 mb-6 p-6 flex-shrink-0"
      >
        <!-- 🔵 BLUE TEAM CARD (name left, logo right - justify-between) -->
        <div class="team-panel flex-1 flex items-center gap-3">
          <div class="flex-shrink-0 p-2">
            <img
              id="blueTeamLogo"
              src="../public/logo/Logo1.png"
              class="w-[100px] h-[100px] md:w-[240px] md:h-[240px] object-contain drop-shadow-2xl"
              alt="Blue Logo"
            />
          </div>
          <h1
            id="blueTeamName"
            class="text-5xl md:text-6xl team-name-xl text-white font-black bg-gradient-to-r from-blue-300 to-blue-500 bg-clip-text text-transparent drop-shadow-md font-montserrat"
          >
            BLUE
          </h1>
        </div>
        <!-- ⏱️ CENTER TIMER (responsive and centered) -->
        <div class="flex items-center justify-center my-2 lg:my-0">
          <div
            class="relative rounded-3xl px-6 py-4 md:px-10 md:py-7 min-w-[240px] text-center"
          >
            <div id="gameClockContainer">
              <div
                class="timer-digits-xl text-white text-5xl md:text-8xl font-montserrat"
              >
                <span
                  class="tracking-wider drop-shadow-[0_0_2px_#FFFFFF]"
                  id="gameClock"
                  >180</span
                >
                <div
                  class="font-montserrat text-white text-xl tracking-wider drop-shadow-[0_0_1px_#FFFFFF] uppercase"
                >
                  Seconds
                </div>
              </div>
            </div>
            <div
              id="overlayTimer"
              class="hidden absolute -bottom-9 text-2xl font-bold text-yellow-300"
            ></div>
            <div
              id="winnerDisplay"
              class="hidden absolute inset-0 bg-black/60 rounded-3xl flex items-center justify-center"
            >
              <div
                id="winnerText"
                class="text-4xl font-bold text-green-300 text-center"
              ></div>
            </div>
          </div>
        </div>

        <!-- 🔴 RED TEAM CARD -->
        <div class="team-panel flex-1 flex items-center justify-end gap-3">
          <h1
            id="redTeamName"
            class="text-5xl md:text-6xl text-white font-black bg-gradient-to-r from-red-300 to-red-500 bg-clip-text text-transparent drop-shadow-md text-right font-montserrat"
          >
            RED
          </h1>
          <div class="flex-shrink-0 p-2">
            <img
              id="blueTeamLogo"
              src="../public/logo/Logo1.png"
              class="w-[100px] h-[100px] md:w-[240px] md:h-[240px] object-contain drop-shadow-2xl"
              alt="Red Logo"
            />
          </div>
        </div>
      </div>

      <!-- Tic-Tac-Toe Grid -->
      <div class="w-full grid grid-cols-[1fr_670px_1fr] overflow-hidden p-10">
        <div class="flex flex-col items-center justify-start pt-13 pr-15">
          <!-- 🔴 RED TEAM SCORE -->
          <div class="flex flex-col items-center gap-4">
            <div
              class="text-white text-3xl font-bold font-montserrat drop-shadow-md underline-offset-4 underline"
            >
              TOTAL SCORE
            </div>
            <div
              class="flex items-center justify-center text-white text-8xl font-bold font-montserrat drop-shadow-[0_0_2px_#FFFFFF]"
              id="blueTotal"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-14">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              ASSEMBLED WEAPON
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="b1Score"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-18">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              KUNG FU SCROLL
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="b2Score"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-17">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              TIC-TAC-TOE
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="b3Score"
            >
              0
            </div>
          </div>
        </div>

        <div class="flex items-center justify-center pt-9">
          <div
            class="grid grid-cols-3 gap-10 p-5 tracking-wider drop-shadow-[0_0_2px_#FFFFFF]"
          >
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
            <div
              class="ttt-cell w-[190px] h-[190px] bg-gray-300 border-4 border-black"
            ></div>
          </div>
        </div>

        <!-- 🔵 BLUE TEAM SCORE -->
        <div class="flex flex-col items-center justify-start pt-13 pl-26">
          <div class="flex flex-col items-center gap-4">
            <div
              class="text-white text-3xl font-bold font-montserrat drop-shadow-md underline-offset-4 underline"
            >
              TOTAL SCORE
            </div>
            <div
              class="flex items-center justify-center text-white text-8xl font-bold font-montserrat drop-shadow-[0_0_2px_#FFFFFF]"
              id="redTotal"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-14">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              ASSEMBLED WEAPON
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="r1Score"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-18">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              KUNG FU SCROLL
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="r2Score"
            >
              0
            </div>
          </div>

          <div class="flex flex-col items-center gap-3 pt-17">
            <div
              class="text-white text-2xl font-bold font-montserrat drop-shadow-md"
            >
              TIC-TAC-TOE
            </div>
            <div
              class="flex items-center justify-center text-white text-6xl font-bold pt-5 drop-shadow-[0_0_2px_#FFFFFF]"
              id="r3Score"
            >
              0
            </div>
          </div>
        </div>
      </div>
      <div
        id="overlayMessage"
        class="text-center text-2xl text-white font-bold pb-6"
      ></div>
    </div>

    <div
      id="stateModal"
      class="hidden absolute inset-0 z-50 bg-black/75 backdrop-blur-sm items-center justify-center"
    >
      <div
        class="w-[90vw] max-w-[1400px] text-center rounded-3xl border-4 border-white/30 bg-black/65 px-8 py-14 shadow-2xl"
      >
        <div
          id="stateModalTitle"
          class="text-white text-6xl md:text-8xl font-black tracking-wide"
        >
          PREPARATION
        </div>
        <div
          id="stateModalSubtitle"
          class="mt-6 text-yellow-300 text-5xl md:text-7xl font-bold"
        ></div>
      </div>
    </div>
  </body>
</html>
